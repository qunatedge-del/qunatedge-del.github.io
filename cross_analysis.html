<style>

  --bg: #0f172a; --bg-card: #1e293b; --bg-hover: #334155;
  --border: #334155; --text: #e2e8f0; --text-dim: #94a3b8; --text-muted: #64748b;
  --accent: #38bdf8; --positive: #22c55e; --warning: #f59e0b; --negative: #ef4444;
  --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Noto Sans TC", sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.5; font-size: 14px; padding: 20px;
}
.container { max-width: 1400px; margin: 0 auto; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
header { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
header h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
header .sub { font-size: 13px; color: var(--text-dim); }
.back-link { display: inline-block; margin-bottom: 16px; font-size: 13px; }
.lang-btn {
  padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: 600;
  border: 1px solid var(--border); background: transparent; color: var(--text-dim);
  cursor: pointer; transition: all 0.2s;
}
.lang-btn:hover { border-color: var(--accent); color: var(--accent); }
.lang-btn.active { background: var(--accent) !important; color: #0f172a !important; border-color: var(--accent); }

/* KPI row */
.kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 20px; }
.kpi { background: var(--bg-card); border-radius: var(--radius); padding: 16px 20px; border-left: 4px solid var(--text-muted); }
.kpi.bull { border-left-color: var(--positive); }
.kpi.bear { border-left-color: var(--negative); }
.kpi.conflict { border-left-color: var(--warning); }
.kpi .label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
.kpi .value { font-size: 32px; font-weight: 700; margin-top: 4px; }

/* Tabs */
.tabs { display: flex; gap: 0; margin-bottom: 0; border-bottom: 2px solid var(--border); }
.tab {
  padding: 10px 20px; cursor: pointer; font-size: 13px; font-weight: 600;
  color: var(--text-dim); border-bottom: 2px solid transparent; margin-bottom: -2px;
  transition: all 0.2s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Table */
.table-section { display: none; }
.table-section.active { display: block; }
.table-desc { padding: 12px 0; font-size: 13px; color: var(--text-dim); }
.table-wrap { overflow-x: auto; }
table { width: 100%; min-width: 1200px; border-collapse: collapse; font-size: 13px; }
th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
th {
  background: var(--bg); color: var(--text-dim); font-size: 11px;
  text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer;
  position: sticky; top: 0; z-index: 1; user-select: none;
}
th:hover { color: var(--text); }
tbody tr:hover { background: var(--bg-hover); }
td.ticker { font-weight: 700; color: var(--accent); }
.badge {
  display: inline-block; padding: 2px 8px; border-radius: 12px;
  font-size: 11px; font-weight: 600; white-space: nowrap;
}
.badge.bullish { background: rgba(34,197,94,0.15); color: var(--positive); }
.badge.bearish { background: rgba(239,68,68,0.15); color: var(--negative); }
.badge.neutral { background: rgba(148,163,184,0.15); color: var(--text-muted); }
.badge.buy { background: rgba(34,197,94,0.2); color: #22c55e; }
.badge.sell { background: rgba(239,68,68,0.2); color: #ef4444; }
.badge.wait { background: rgba(56,189,248,0.2); color: #38bdf8; }
.badge.fail { background: rgba(245,158,11,0.2); color: #f59e0b; }
.flow-pos { color: var(--positive); font-weight: 600; }
.flow-neg { color: var(--negative); font-weight: 600; }
.align-row { background: rgba(34,197,94,0.06); }
.align-row-bear { background: rgba(239,68,68,0.06); }
footer {
  margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border);
  font-size: 12px; color: var(--text-muted);
}

@media (max-width: 768px) {
  body { padding: 12px; }
  .kpi-row { grid-template-columns: 1fr 1fr; }
  .kpi .value { font-size: 24px; }
  .tabs { overflow-x: auto; }
  .tab { font-size: 12px; padding: 8px 12px; white-space: nowrap; }
}

  var cols = [["col_ticker","ticker"],["col_price","price"]];
  if (showScreener) {
    cols = cols.concat([["col_screener","v2_status"],["col_advice","v2_advice"],["col_strategy","strategy"],["col_intent","intent"],["col_rsi","rsi"]]);
  }
  cols = cols.concat([["col_opt_dir","opt_dir"],["col_opt_score","opt_score"],["col_net_flow","net_flow"],["col_iv_rank","iv_rank"],["col_pcr","pcr"],["col_unusual","unusual"],["col_action","opt_action"]]);

  var thead = "<thead><tr>" + cols.map(function(c){ return "<th>" + (T[c[0]] || c[0]) + "</th>"; }).join("") + "</tr></thead>";

  var bodyRows = rows.map(function(r) {
    var tds = cols.map(function(c) {
      var dk = c[1], val = r[dk];
      if (dk === "ticker") {
        return '<td class="ticker"><a href="https://www.tradingview.com/chart/?symbol=' + val + '" target="_blank" style="color:var(--accent);font-weight:700">' + val + ' \u2197</a></td>';
      }
      if (dk === "price") {
        return (val && val !== "\u2014") ? '<td style="font-variant-numeric:tabular-nums">$' + Number(val).toFixed(2) + '</td>' : '<td style="color:var(--text-muted)">\u2014</td>';
      }
      if (dk === "v2_status") {
        var cm = {buy:"buy",sell:"sell",sell_wait:"sell",sell_confirmed:"sell",wait:"wait",fail:"fail"};
        return '<td><span class="badge ' + (cm[val] || "neutral") + '">' + (val || "\u2014") + '</span></td>';
      }
      if (dk === "opt_dir") {
        var icon = val === "BULLISH" ? "\ud83d\udfe2" : val === "BEARISH" ? "\ud83d\udd34" : "\u26aa";
        var cls = val === "BULLISH" ? "bullish" : val === "BEARISH" ? "bearish" : "neutral";
        return '<td><span class="badge ' + cls + '">' + icon + ' ' + val + '</span></td>';
      }
      if (dk === "net_flow") {
        var fv = r.net_flow_raw || 0;
        var lbl = fmtFlow(fv);
        var fc = fv > 0 ? "flow-pos" : fv < 0 ? "flow-neg" : "";
        return '<td class="' + fc + '" data-sort="' + fv + '">' + lbl + '</td>';
      }
      if (dk === "opt_score") {
        return '<td data-sort="' + (r.score_num || 0) + '">' + (r.stars || "") + ' (' + (r.score_num || 0) + ')</td>';
      }
      if (dk === "iv_rank") {
        var iv = r.iv_rank_val;
        if (iv != null) {
          var cl = iv < 30 ? "var(--positive)" : iv > 70 ? "var(--negative)" : "var(--text)";
          return '<td style="color:' + cl + ';font-weight:600" data-sort="' + iv + '">' + iv.toFixed(1) + '%</td>';
        }
        return '<td style="color:var(--text-muted)">\u2014</td>';
      }
      if (dk === "pcr") {
        var pc = r.pcr_val;
        if (pc != null) {
          var cl2 = pc > 1.0 ? "var(--negative)" : pc < 0.7 ? "var(--positive)" : "var(--text)";
          return '<td style="color:' + cl2 + ';font-weight:600" data-sort="' + pc + '">' + pc.toFixed(2) + '</td>';
        }
        return '<td style="color:var(--text-muted)">\u2014</td>';
      }
      if (dk === "unusual") {
        var u = r.unusual_val || 0;
        var uc = u > 50 ? "var(--warning)" : "var(--text)";
        return '<td style="color:' + uc + '" data-sort="' + u + '">' + u + '</td>';
      }
      if (dk === "rsi") {
        var rv = r.rsi_val;
        if (rv != null) {
          var rc = rv >= 70 ? "var(--negative)" : rv <= 30 ? "var(--positive)" : "var(--text)";
          var tag = rv >= 70 ? " \ud83d\udd25" : rv <= 30 ? " \u2744\ufe0f" : "";
          return '<td style="color:' + rc + ';font-weight:600" data-sort="' + rv + '">' + rv.toFixed(1) + tag + '</td>';
        }
        return '<td style="color:var(--text-muted)">\u2014</td>';
      }
      if (dk === "intent") {
        var intentKey = "intent_" + (val || "unknown");
        return '<td>' + (T[intentKey] || val || "\u2014") + '</td>';
      }
      return '<td>' + (val || "\u2014") + '</td>';
    });
    var rc = r.category === "bull" ? ' class="align-row"' : r.category === "bear" ? ' class="align-row-bear"' : "";
    return "<tr" + rc + ">" + tds.join("") + "</tr>";
  });

  return "<table>" + thead + "<tbody>" + bodyRows.join("") + "</tbody></table>";
}

function attachSort() {
  document.querySelectorAll('table').forEach(function(table) {
    var headers = table.querySelectorAll('th');
    var sortCol = -1, sortDir = 1;
    headers.forEach(function(th, idx) {
      th.addEventListener('click', function() {
        if (sortCol === idx) sortDir *= -1;
        else { sortCol = idx; sortDir = 1; }
        var tbody = table.querySelector('tbody');
        var rows = Array.from(tbody.querySelectorAll('tr'));
        rows.sort(function(a, b) {
          var at = (a.cells[idx] && a.cells[idx].getAttribute('data-sort')) || (a.cells[idx] && a.cells[idx].textContent) || '';
          var bt = (b.cells[idx] && b.cells[idx].getAttribute('data-sort')) || (b.cells[idx] && b.cells[idx].textContent) || '';
          var an = parseFloat(at), bn = parseFloat(bt);
          if (!isNaN(an) && !isNaN(bn)) return (an - bn) * sortDir;
          return at.localeCompare(bt) * sortDir;
        });
        rows.forEach(function(r){ tbody.appendChild(r); });
      });
    });
  });
}

function showTab(name) {
  activeTab = name;
  document.querySelectorAll('.tab').forEach(function(t, i) {
    t.classList.toggle('active', TAB_KEYS[i] === name);
  });
  document.querySelectorAll('.table-section').forEach(function(s){ s.classList.remove('active'); });
  var sec = document.getElementById('section-' + name);
  if (sec) sec.classList.add('active');
}

function renderAll() {
  document.getElementById("back-link").textContent = T.back_link;
  document.getElementById("header-title").textContent = T.header_title;
  document.getElementById("header-sub").textContent = T.subtitle + " \u00b7 " + UPDATED;
  document.getElementById("footer-text").textContent = T.footer;

  // KPIs
  document.getElementById("kpi-total-label").textContent = T.summary_total.replace("{n}", COUNTS.overlap);
  document.getElementById("kpi-total-val").textContent = COUNTS.overlap;
  document.getElementById("kpi-bull-label").textContent = T.summary_bull;
  document.getElementById("kpi-bull-val").textContent = COUNTS.bull;
  document.getElementById("kpi-bear-label").textContent = T.summary_bear;
  document.getElementById("kpi-bear-val").textContent = COUNTS.bear;
  document.getElementById("kpi-conflict-label").textContent = T.summary_conflict;
  document.getElementById("kpi-conflict-val").textContent = COUNTS.conflict;

  // Tabs
  var tabsBar = document.getElementById("tabs-bar");
  tabsBar.innerHTML = TAB_KEYS.map(function(k, i) {
    var label = T["tab_" + k] || k;
    var cls = k === activeTab ? "tab active" : "tab";
    return '<div class="' + cls + '" onclick="showTab(\'' + k + '\')">' + label + '</div>';
  }).join("");

  // Descriptions
  document.getElementById("desc-bull").textContent = T.bull_desc;
  document.getElementById("desc-bear").textContent = T.bear_desc;
  document.getElementById("desc-conflict").textContent = T.conflict_desc;
  document.getElementById("desc-opts_only").textContent = T.opts_only_desc;

  // Tables
  document.getElementById("table-bull").innerHTML = buildTable(DATA.bull, true);
  document.getElementById("table-bear").innerHTML = buildTable(DATA.bear, true);
  document.getElementById("table-conflict").innerHTML = buildTable(DATA.conflict, true);
  document.getElementById("table-opts_only").innerHTML = buildTable(DATA.opts_only, false);

  attachSort();
}

// Init
renderAll();
if (currentLang !== "zh") switchLang(currentLang);
</script>
</body>
</html>
